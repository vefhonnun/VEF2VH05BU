<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* spjallbox */
        #check {
            display: none;
        }
        .chatbox label {
            display: block;
            position: fixed;
            right: 1rem;
            bottom: 2rem;
            width: 2rem;
            height: 2rem;
            background-color: black;
            border: 1px solid red;
            border-radius: .4rem;
            cursor: pointer;
            z-index: 9;
            text-align: center;
            padding-top: .2rem;
        }
        .chatbox label:hover,
        .chatbox label:focus {
            background-color: red;
        }
        .chat-content {
            position: fixed;
            right: -22rem;
            bottom: 4rem;
            width: 20rem;
            height: 26rem;
            border: 1px solid #ccc;
            padding: 1rem;
            background-color: rgb(231, 231, 231);
            border-radius: .4rem;
            transition: right 0.3s ease-in-out;
            z-index: 12;
        }
        #check:checked ~ .chat-content {
            right: 1rem;
            transition: right 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <h1>Dæmi um spjallbox</h1>
    
    <!--spjallbox-->
    <section class="chatbox">
        <input type="checkbox" id="check">
        <label for="check"><span class="icon-bubbles4"></span></label>
        <div class="chat-content">
            <p>Hvernig get ég aðstoðað þig?</p>
            <form action="#" method="get">
                <textarea placeholder="Skrifaðu skilaboð..." rows="5"></textarea>
                <div><input type="text" name="name" required placeholder="Nafn"></div>
                <div><input type="email" name="email" required placeholder="Tölvupóstfang"></div>
                <button type="submit" class="animate__shakeX">Senda skilaboð</button>
            </form>
        </div>
    </section>
</body>
</html>
